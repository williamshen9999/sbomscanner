name: scan
on:
  push:
    paths:
      - go.sum
      - go.mod
  pull_request:
    paths:
      - go.sum
      - go.mod
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: Install govulncheck
        env:
          # TODO: re-enable Renovate updates (restore the
          # `# renovate: datasource=go depName=golang.org/x/vuln` annotation)
          # once a govulncheck release ships with the fix from
          # https://github.com/golang/tools/pull/652. v1.4.0 panics during
          # call-graph construction:
          #   panic: ForEachElement called on type containing *types.TypeParam
          GOVULNCHECK_VERSION: "1.3.0"
        run: go install "golang.org/x/vuln/cmd/govulncheck@v${GOVULNCHECK_VERSION}"
      - name: Run govulncheck
        # With `-format sarif` govulncheck exits 0 even when vulnerabilities
        # are found; findings are surfaced via the SARIF upload below. See
        # https://pkg.go.dev/golang.org/x/vuln/cmd/govulncheck#hdr-Exit_codes
        run: govulncheck -format sarif ./... > govulncheck.sarif
      - name: Upload SARIF to GitHub Security tab
        # Skip for PRs from forks: GitHub strips `security-events: write` from
        # the token in that case, so the upload would fail. The SARIF is still
        # available as a workflow artifact (uploaded below) for reviewers.
        if: github.event.pull_request.head.repo.fork != true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
      - name: Upload SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: govulncheck-sarif
          path: govulncheck.sarif
          if-no-files-found: warn

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Install Trivy
        env:
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          TRIVY_VERSION: "0.71.2"
        run: |
          set -euo pipefail
          tarball="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          base="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          curl -fsSL -o "${tarball}"               "${base}/${tarball}"
          curl -fsSL -o "${tarball}.sigstore.json" "${base}/${tarball}.sigstore.json"
          # Verify the tarball was signed by Trivy's release workflow on GitHub
          # via Sigstore keyless signing. This binds the artifact to the
          # specific upstream tag's release workflow identity.
          cosign verify-blob \
            --bundle "${tarball}.sigstore.json" \
            --certificate-identity-regexp "^https://github\.com/aquasecurity/trivy/\.github/workflows/.+@refs/tags/v${TRIVY_VERSION}\$" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "${tarball}"
          tar -xzf "${tarball}" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          rm -f trivy "${tarball}" "${tarball}.sigstore.json"
          trivy --version
      - name: Run Trivy filesystem scan
        # Exit 0 so findings are surfaced via the SARIF upload below rather
        # than failing the job.
        run: |
          trivy fs \
            --scanners vuln \
            --format sarif \
            --output trivy.sarif \
            --exit-code 0 \
            go.mod
      - name: Upload SARIF to GitHub Security tab
        # Skip for PRs from forks: GitHub strips `security-events: write` from
        # the token in that case, so the upload would fail. The SARIF is still
        # available as a workflow artifact (uploaded below) for reviewers.
        if: github.event.pull_request.head.repo.fork != true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy
      - name: Upload SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sarif
          path: trivy.sarif
          if-no-files-found: warn
